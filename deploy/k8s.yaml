apiVersion: apps/v1
kind: Deployment
metadata: { name: optout, labels: { app: optout } }
spec:
  replicas: 1
  selector: { matchLabels: { app: optout } }
  template:
    metadata: { labels: { app: optout } }
    spec:
      containers:
        - name: optout
          image: ghcr.io/cognis-digital/optout:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: optout }
spec:
  selector: { app: optout }
  ports: [{ port: 80, targetPort: 8000 }]
